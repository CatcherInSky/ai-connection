<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <title>AI Connection Monitor</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <style>
      html,
      body {
        margin: 0;
        padding: 0;
        font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI",
          sans-serif;
        background: #0f172a;
        color: #e5e7eb;
      }
      .app {
        display: flex;
        flex-direction: column;
        height: 100vh;
        padding: 12px 16px;
        box-sizing: border-box;
        gap: 12px;
      }
      .header {
        display: flex;
        justify-content: space-between;
        align-items: center;
      }
      .title {
        font-size: 16px;
        font-weight: 600;
      }
      .stats {
        font-size: 12px;
        color: #9ca3af;
      }
      .controls {
        display: flex;
        gap: 8px;
        align-items: center;
      }
      select,
      input {
        background: #020617;
        border: 1px solid #1f2937;
        border-radius: 4px;
        color: #e5e7eb;
        padding: 2px 6px;
        font-size: 12px;
      }
      button {
        background: #22c55e;
        border: none;
        border-radius: 4px;
        color: #022c22;
        padding: 4px 10px;
        font-size: 12px;
        cursor: pointer;
      }
      button:disabled {
        opacity: 0.5;
        cursor: default;
      }
      .content {
        display: grid;
        grid-template-columns: 1.1fr 2fr;
        gap: 12px;
        min-height: 0;
      }
      .panel {
        background: #020617;
        border-radius: 8px;
        border: 1px solid #1f2937;
        padding: 10px;
        box-sizing: border-box;
        display: flex;
        flex-direction: column;
        min-height: 0;
      }
      .panel-title {
        font-size: 13px;
        font-weight: 500;
        margin-bottom: 6px;
      }
      .chart-header {
        display: flex;
        justify-content: space-between;
        align-items: center;
        margin-bottom: 6px;
      }
      .chart-header .panel-title {
        margin-bottom: 0;
      }
      .chart-zoom {
        display: flex;
        align-items: center;
        gap: 4px;
      }
      .chart-zoom button {
        width: 24px;
        height: 24px;
        padding: 0;
        font-size: 16px;
        line-height: 1;
        background: #1e293b;
        border: 1px solid #334155;
        color: #e5e7eb;
        border-radius: 4px;
        cursor: pointer;
      }
      .chart-zoom button:hover {
        background: #334155;
      }
      .chart-zoom span {
        font-size: 12px;
        color: #9ca3af;
        min-width: 28px;
        text-align: center;
      }
      table {
        width: 100%;
        border-collapse: collapse;
        font-size: 12px;
      }
      th,
      td {
        padding: 4px 6px;
        text-align: left;
        border-bottom: 1px solid #111827;
      }
      th {
        color: #9ca3af;
        font-weight: 500;
      }
      tr:last-child td {
        border-bottom: none;
      }
      .status-ok {
        color: #22c55e;
      }
      .status-fail {
        color: #f97373;
      }
      .status-probing {
        color: #f59e0b;
      }
      .chart-wrap {
        flex: 1;
        display: flex;
        flex-direction: column;
        min-height: 0;
        position: relative;
      }
      canvas {
        flex: 1;
        min-height: 120px;
        border-radius: 6px;
        background: #020617;
        cursor: crosshair;
      }
      .chart-tooltip {
        position: absolute;
        background: #1e293b;
        border: 1px solid #334155;
        border-radius: 4px;
        padding: 6px 10px;
        font-size: 11px;
        color: #e5e7eb;
        pointer-events: none;
        z-index: 10;
        display: none;
      }
      .chart-tooltip.visible {
        display: block;
      }
    </style>
  </head>
  <body>
    <div class="app">
      <div class="header">
        <div>
          <div class="title">AI Connection Monitor</div>
          <div class="stats" id="summary"></div>
        </div>
        <div class="controls">
          <label style="font-size: 12px">
            间隔(ms)：
            <input id="interval-input" type="number" min="5000" step="1000" />
          </label>
        </div>
      </div>
      <div class="content">
        <div class="panel">
          <div class="panel-title">当前状态</div>
          <table>
            <thead>
              <tr>
                <th>服务</th>
                <th>状态</th>
                <th>延迟(ms)</th>
                <th>HTTP</th>
                <th>错误</th>
              </tr>
            </thead>
            <tbody id="status-body"></tbody>
          </table>
        </div>
        <div class="panel">
          <div class="chart-header">
            <span class="panel-title">最近 24 小时延迟（全部服务）</span>
            <div class="chart-zoom">
              <button type="button" id="zoom-out" title="缩小">−</button>
              <span id="zoom-label">1×</span>
              <button type="button" id="zoom-in" title="放大">+</button>
            </div>
          </div>
          <div class="chart-wrap">
            <canvas id="latency-canvas"></canvas>
            <div id="chart-tooltip" class="chart-tooltip"></div>
          </div>
        </div>
      </div>
    </div>
    <script>
      (function () {
        var invoke =
          window.__TAURI__ &&
          window.__TAURI__.core &&
          typeof window.__TAURI__.core.invoke === "function"
            ? window.__TAURI__.core.invoke
            : null;
        if (!invoke) {
          invoke = function () {
            return Promise.reject(new Error("Tauri invoke 不可用，请确认在 Tauri 窗口中打开"));
          };
        }
        const statusBody = document.getElementById("status-body");
      const summary = document.getElementById("summary");
      const intervalInput = document.getElementById("interval-input");
      const canvas = document.getElementById("latency-canvas");
      const chartTooltip = document.getElementById("chart-tooltip");
      const zoomInBtn = document.getElementById("zoom-in");
      const zoomOutBtn = document.getElementById("zoom-out");
      const zoomLabel = document.getElementById("zoom-label");
      const ctx = canvas.getContext("2d");

      let services = [];
      const latestByService = new Map();
      let isProbing = false;
      let chartData = null;

      // 图表的时间窗口（最近多少时间）
      const MAX_WINDOW_MS = 48 * 60 * 60 * 1000; // 保持与原先最大 48h 一致
      const MIN_WINDOW_MS = 30 * 1000; // 最小粒度：30s
      const SECONDS_THRESHOLD_MS = 5 * 60 * 1000; // <= 5min 显示秒
      let timeWindowMs = 24 * 60 * 60 * 1000; // 默认 24h

      // 前端缓存：滚轮缩放时避免反复 invoke 后端
      let allPointsCache = [];
      const allPointsIndex = new Set(); // key: service_id|timestamp
      let cacheLoaded = false;

      function getPointKey(p) {
        return p.service_id + "|" + p.timestamp;
      }

      function mergePoints(points) {
        if (!Array.isArray(points) || points.length === 0) return;
        for (const p of points) {
          if (!p || typeof p.service_id !== "string") continue;
          if (typeof p.timestamp !== "number") continue;
          const key = getPointKey(p);
          if (allPointsIndex.has(key)) continue;
          allPointsIndex.add(key);
          allPointsCache.push(p);
        }

        // 控制缓存大小：只保留最近 MAX_WINDOW_MS + 缓冲窗口
        if (allPointsCache.length > 50000) {
          const cutoff = Date.now() - (MAX_WINDOW_MS + 5 * 60 * 1000);
          const next = [];
          const nextIndex = new Set();
          for (const p of allPointsCache) {
            if (p.timestamp >= cutoff) {
              nextIndex.add(getPointKey(p));
              next.push(p);
            }
          }
          allPointsCache = next;
          allPointsIndex.clear();
          for (const k of nextIndex) allPointsIndex.add(k);
        }
      }

      function shouldShowSeconds() {
        return timeWindowMs <= SECONDS_THRESHOLD_MS;
      }

      function formatWindowLabel(ms) {
        if (ms <= 60 * 1000) {
          return Math.max(1, Math.round(ms / 1000)) + "s";
        }
        if (ms <= 60 * 60 * 1000) {
          return Math.max(1, Math.round(ms / 60_000)) + "m";
        }
        return Math.max(1, Math.round(ms / 3_600_000)) + "h";
      }

      const CHART_COLORS = ["#22c55e", "#3b82f6", "#f59e0b", "#a855f7", "#ef4444"];

      function getLogicalSize() {
        const rect = canvas.getBoundingClientRect();
        return { w: rect.width, h: rect.height };
      }

      function resizeCanvas() {
        const rect = canvas.getBoundingClientRect();
        const dpr = window.devicePixelRatio || 1;
        canvas.width = rect.width * dpr;
        canvas.height = rect.height * dpr;
        ctx.setTransform(dpr, 0, 0, dpr, 0, 0);
      }

      window.addEventListener("resize", () => {
        resizeCanvas();
        drawLatencyAll();
      });

      function renderStatusTable() {
        statusBody.innerHTML = "";
        for (const svc of services) {
          const tr = document.createElement("tr");
          const latest = latestByService.get(svc.id);
          const tdName = document.createElement("td");
          tdName.textContent = svc.name;
          const tdStatus = document.createElement("td");
          const tdLatency = document.createElement("td");
          const tdHttp = document.createElement("td");
          const tdError = document.createElement("td");

          if (isProbing) {
            tdStatus.textContent = "检测中...";
            tdStatus.className = "status-probing";
            tdLatency.textContent = "-";
            tdHttp.textContent = "-";
            tdError.textContent = "-";
          } else if (!latest) {
            tdStatus.textContent = "-";
            tdLatency.textContent = "-";
            tdHttp.textContent = "-";
            tdError.textContent = "-";
          } else {
            if (latest.reachable) {
              tdStatus.textContent = "可达";
              tdStatus.className = "status-ok";
            } else {
              tdStatus.textContent = "失败";
              tdStatus.className = "status-fail";
            }
            tdLatency.textContent =
              latest.latency_ms != null ? String(latest.latency_ms) : "-";
            tdHttp.textContent =
              latest.status_code != null ? String(latest.status_code) : "-";
            tdError.textContent = latest.error_type ?? "-";
          }

          tr.appendChild(tdName);
          tr.appendChild(tdStatus);
          tr.appendChild(tdLatency);
          tr.appendChild(tdHttp);
          tr.appendChild(tdError);
          statusBody.appendChild(tr);
        }
      }

      function formatTimeLabel(ts, showSeconds) {
        const d = new Date(ts);
        const now = new Date();
        const isToday = d.toDateString() === now.toDateString();
        const hh = d.getHours().toString().padStart(2, "0");
        const mm = d.getMinutes().toString().padStart(2, "0");
        const ss = d.getSeconds().toString().padStart(2, "0");
        if (isToday) {
          return showSeconds ? hh + ":" + mm + ":" + ss : hh + ":" + mm;
        }
        const md = d.getMonth() + 1 + "/" + d.getDate();
        const base = md + " " + hh + ":" + mm;
        return showSeconds ? base + ":" + ss : base;
      }

      /**
       * 根据当前时间窗口重新绘制延迟图表。
       * 注意：滚轮缩放不再 invoke 后端；数据来自前端缓存 `allPointsCache`。
       */
      function drawLatencyAll() {
        const now = Date.now();
        const since = now - timeWindowMs;
        const showSeconds = shouldShowSeconds();
        const xTickCount = showSeconds ? 8 : 5;

        // 截取当前窗口内的数据（缓存是“最近 MAX_WINDOW_MS”）
        const allPoints = allPointsCache.filter((p) => p.timestamp >= since);

        const { w: logicalW, h: logicalH } = getLogicalSize();
        ctx.clearRect(0, 0, logicalW, logicalH);
        chartData = null;

        const byService = new Map();
        for (const p of allPoints) {
          if (!byService.has(p.service_id)) {
            byService.set(p.service_id, []);
          }
          byService.get(p.service_id).push(p);
        }

        // 让横轴严格对应“当前时间窗口”
        const minX = since;
        const maxX = now;
        const minY = 0;
        let maxY = 100;

        // 为断线检测/连线绘制提供稳定顺序
        for (const pts of byService.values()) {
          pts.sort((a, b) => a.timestamp - b.timestamp);
          for (const p of pts) {
            if (p.reachable && p.latency_ms != null) {
              maxY = Math.max(maxY, p.latency_ms);
            }
          }
        }

        const padLeft = 48;
        const padRight = 12;
        const padTop = 12;
        const padBottom = 24;
        const w = logicalW - padLeft - padRight;
        const h = logicalH - padTop - padBottom;

        function sx(t) {
          if (maxX === minX) return padLeft;
          return padLeft + ((t - minX) / (maxX - minX)) * w;
        }
        function sy(v) {
          if (maxY === minY) return padTop + h;
          return padTop + h - ((v - minY) / (maxY - minY)) * h;
        }

        ctx.fillStyle = "#9ca3af";
        ctx.font = "11px system-ui";
        ctx.textAlign = "right";
        ctx.textBaseline = "middle";

        const yStep = maxY <= 500 ? 100 : maxY <= 2000 ? 500 : 1000;
        const yTicks = [];
        for (let v = 0; v <= maxY + 1; v += yStep) yTicks.push(v);
        if (yTicks.length > 0 && yTicks[yTicks.length - 1] < maxY) {
          yTicks.push(Math.ceil(maxY / 100) * 100);
        }
        for (const v of yTicks) {
          const y = sy(v);
          ctx.beginPath();
          ctx.moveTo(padLeft, y);
          ctx.lineTo(padLeft + w, y);
          ctx.strokeStyle = "#1f2937";
          ctx.stroke();
          ctx.fillText(v + "ms", padLeft - 4, y);
        }

        ctx.textAlign = "center";
        ctx.textBaseline = "top";
        for (let i = 0; i <= xTickCount; i++) {
          const t = minX + (i / xTickCount) * (maxX - minX);
          const x = sx(t);
          ctx.beginPath();
          ctx.moveTo(x, padTop);
          ctx.lineTo(x, padTop + h);
          ctx.strokeStyle = "#1f2937";
          ctx.stroke();
          ctx.fillText(formatTimeLabel(t, showSeconds), x, padTop + h + 4);
        }

        ctx.beginPath();
        ctx.moveTo(padLeft, padTop);
        ctx.lineTo(padLeft, padTop + h);
        ctx.lineTo(padLeft + w, padTop + h);
        ctx.strokeStyle = "#374151";
        ctx.lineWidth = 1;
        ctx.stroke();

        const legendItems = [];
        services.forEach((svc, idx) => {
          const pts = byService.get(svc.id) || [];
          const color = CHART_COLORS[idx % CHART_COLORS.length];
          legendItems.push({ name: svc.name, color });

          ctx.strokeStyle = color;
          ctx.lineWidth = 1.5;
          let segmentStarted = false;
          let prevValidTimestamp = null;
          // 如果相邻点间隔远超“正常探测周期”，说明中断来自会话关闭/重启，需断开折线
          const gapThresholdMs = Math.max(
            10_000,
            currentIntervalMs * 2 + 5_000
          );
          for (const p of pts) {
            const isValid = p.reachable && p.latency_ms != null;
            if (isValid) {
              const x = sx(p.timestamp);
              const y = sy(p.latency_ms);
              if (!segmentStarted) {
                ctx.beginPath();
                ctx.moveTo(x, y);
                segmentStarted = true;
                prevValidTimestamp = p.timestamp;
              } else {
                const delta = p.timestamp - prevValidTimestamp;
                if (delta > gapThresholdMs) {
                  ctx.stroke();
                  ctx.beginPath();
                  ctx.moveTo(x, y);
                } else {
                  ctx.lineTo(x, y);
                }
                prevValidTimestamp = p.timestamp;
              }
            } else {
              if (segmentStarted) {
                ctx.stroke();
                segmentStarted = false;
                prevValidTimestamp = null;
              }
            }
          }
          if (segmentStarted) ctx.stroke();
        });

        ctx.save();
        ctx.textAlign = "left";
        ctx.textBaseline = "middle";
        ctx.font = "11px system-ui";
        const legendX = padLeft + w - 120;
        let legendY = padTop + 8;
        for (const it of legendItems) {
          ctx.fillStyle = it.color;
          ctx.fillRect(legendX, legendY - 4, 18, 4);
          ctx.fillStyle = "#e5e7eb";
          ctx.fillText(it.name, legendX + 22, legendY - 2);
          legendY += 14;
        }
        ctx.restore();

        if (legendItems.length === 0) {
          ctx.fillStyle = "#4b5563";
          ctx.font = "12px system-ui";
          ctx.fillText("暂无数据", 16, 24);
          return;
        }
        chartData = { byService, legendItems, padLeft, padRight, padTop, padBottom, w, h, minX, maxX, minY, maxY };
      }

      async function preloadChartCache() {
        if (cacheLoaded) return;
        const now = Date.now();
        const sinceMs = now - MAX_WINDOW_MS;
        try {
          const raw = await invoke("get_recent_probes_all", { sinceMs: sinceMs });
          mergePoints(Array.isArray(raw) ? raw : []);
        } catch (e) {
          console.error("get_recent_probes_all failed:", e);
        }
        cacheLoaded = true;
      }

      let currentIntervalMs = 30000;

      function updateSummary() {
        let ok = 0;
        let total = 0;
        for (const svc of services) {
          const latest = latestByService.get(svc.id);
          if (!latest) continue;
          total++;
          if (latest.reachable) ok++;
        }
        const sec = Math.round(currentIntervalMs / 1000);
        if (!total) {
          summary.textContent = "暂无探测结果 · 每 " + sec + " 秒自动探测";
        } else {
          summary.textContent = "可达服务：" + ok + "/" + total + " · 每 " + sec + " 秒自动探测";
        }
      }

      function updateIntervalHint(intervalMs) {
        currentIntervalMs = intervalMs;
        updateSummary();
      }

      let zoomRedrawRafPending = false;

      function scheduleChartRedraw() {
        if (zoomRedrawRafPending) return;
        zoomRedrawRafPending = true;
        requestAnimationFrame(() => {
          zoomRedrawRafPending = false;
          drawLatencyAll();
        });
      }

      function setTimeWindowMs(nextMs) {
        const clamped = Math.max(MIN_WINDOW_MS, Math.min(MAX_WINDOW_MS, nextMs));
        if (clamped === timeWindowMs) return;
        timeWindowMs = clamped;
        zoomLabel.textContent = formatWindowLabel(timeWindowMs);
        scheduleChartRedraw();
      }

      function zoomByFactor(factor) {
        // factor > 1：放大时间范围（相当于“缩小”图表）；factor < 1：反之
        setTimeWindowMs(timeWindowMs * factor);
      }

      function setupChartZoom() {
        zoomLabel.textContent = formatWindowLabel(timeWindowMs);
        zoomInBtn.addEventListener("click", () => zoomByFactor(1 / 1.6));
        zoomOutBtn.addEventListener("click", () => zoomByFactor(1.6));
        const chartWrap = canvas.parentElement;
        chartWrap.addEventListener(
          "wheel",
          (e) => {
            if (!(e.ctrlKey || e.metaKey)) return;
            e.preventDefault();

            // 平滑连续缩放：滚轮越大，窗口变化越明显
            // deltaY<0（向上滚）=> zoom in => timeWindowMs 变小
            const sens = 0.0015;
            const factor = Math.exp(e.deltaY * sens);
            setTimeWindowMs(timeWindowMs * factor);
          },
          { passive: false }
        );
      }

      function setupChartHover() {
        const chartWrap = canvas.parentElement;
        canvas.addEventListener("mousemove", (e) => {
          if (!chartData) return;
          const wrapRect = chartWrap.getBoundingClientRect();
          const mx = e.clientX - wrapRect.left;
          const my = e.clientY - wrapRect.top;
          const { byService, padLeft, padTop, w, h, minX, maxX, minY, maxY } = chartData;
          if (mx < padLeft || mx > padLeft + w || my < padTop || my > padTop + h) {
            chartTooltip.classList.remove("visible");
            return;
          }
          const invX = minX + ((mx - padLeft) / w) * (maxX - minX);
          let lines = [];
          services.forEach((svc, idx) => {
            const pts = (byService.get(svc.id) || []).filter((p) => p.reachable && p.latency_ms != null);
            if (!pts.length) return;
            let nearest = null;
            let minDist = Infinity;
            for (const p of pts) {
              const dist = Math.abs(p.timestamp - invX);
              if (dist < minDist) {
                minDist = dist;
                nearest = p;
              }
            }
            if (nearest && minDist < (maxX - minX) / 20) {
              const color = CHART_COLORS[idx % CHART_COLORS.length];
              lines.push('<span style="color:' + color + '">' + svc.name + '</span>: ' + nearest.latency_ms + 'ms');
            }
          });
          if (lines.length) {
            chartTooltip.innerHTML =
              formatTimeLabel(invX, shouldShowSeconds()) + "<br>" + lines.join("<br>");
            chartTooltip.classList.add("visible");
            const tx = Math.min(mx + 12, wrapRect.width - 120);
            const ty = Math.min(my + 12, wrapRect.height - 80);
            chartTooltip.style.left = tx + "px";
            chartTooltip.style.top = ty + "px";
          } else {
            chartTooltip.classList.remove("visible");
          }
        });
        canvas.addEventListener("mouseleave", () => chartTooltip.classList.remove("visible"));
      }

      async function loadInitialData() {
        try {
          const list = await invoke("get_services");
          services = Array.isArray(list) ? list : [];
        } catch (e) {
          console.error("get_services failed:", e);
          summary.textContent = "加载服务列表失败: " + String(e);
          return;
        }

        try {
          const settings = await invoke("get_settings");
          intervalInput.value = String(settings.probe_interval_ms);
          currentIntervalMs = settings.probe_interval_ms;
        } catch (e) {
          console.error("get_settings failed:", e);
        }

        renderStatusTable();
        updateSummary();
        resizeCanvas();
        setupChartZoom();
        setupChartHover();

        // 启动时预加载最近 MAX_WINDOW_MS 数据；后续缩放仅过滤缓存
        await preloadChartCache();
        drawLatencyAll();

        isProbing = true;
        renderStatusTable();
        try {
          const results = await invoke("run_probe_all", {});
          const arr = Array.isArray(results) ? results : [];
          for (const r of arr) latestByService.set(r.service_id, r);
          mergePoints(arr);
        } catch (e) {
          console.error("初始探测失败:", e);
        } finally {
          isProbing = false;
          renderStatusTable();
          updateSummary();
          drawLatencyAll();
        }
      }

      function syncIntervalHint() {
        const v = Number(intervalInput.value);
        if (Number.isFinite(v) && v >= 1000) {
          currentIntervalMs = v;
          updateSummary();
        }
      }
      intervalInput.addEventListener("input", syncIntervalHint);
      intervalInput.addEventListener("change", syncIntervalHint);
      intervalInput.addEventListener("blur", async () => {
        const v = Number(intervalInput.value);
        if (!Number.isFinite(v) || v < 5000) {
          try {
            const settings = await invoke("get_settings");
            intervalInput.value = String(settings.probe_interval_ms);
            updateIntervalHint(settings.probe_interval_ms);
          } catch (_) {}
          return;
        }
        try {
          await invoke("update_probe_interval", { intervalMs: v });
          updateIntervalHint(v);
        } catch (e) {
          console.error("update_probe_interval failed:", e);
        }
      });
      intervalInput.addEventListener("keydown", (e) => {
        if (e.key === "Enter") intervalInput.blur();
      });

      (async function setupEvents() {
        const tauri = window.__TAURI__;
        if (!tauri || !tauri.event || !tauri.event.listen) return;
        try {
          await tauri.event.listen("probe_started", function () {
            isProbing = true;
            renderStatusTable();
          });
          await tauri.event.listen("tray_probe_now", async function () {
            try {
              const results = await invoke("run_probe_all", {});
              const arr = Array.isArray(results) ? results : [];
              for (const r of arr) latestByService.set(r.service_id, r);
              mergePoints(arr);
              renderStatusTable();
              updateSummary();
              drawLatencyAll();
            } catch (e) {
              console.error("托盘触发探测失败:", e);
            }
          });
          await tauri.event.listen("probe_batch", function (event) {
            let batch = (event && event.payload) ? event.payload : (Array.isArray(event) ? event : []);
            if (typeof batch === "string") {
              try { batch = JSON.parse(batch); } catch (_) { batch = []; }
            }
            const arr = Array.isArray(batch) ? batch : [];
            for (const r of arr) latestByService.set(r.service_id, r);
            mergePoints(arr);
            isProbing = false;
            renderStatusTable();
            updateSummary();
            drawLatencyAll();
          });
        } catch (e) {
          console.error("event listen failed:", e);
        }
      })();

      setTimeout(loadInitialData, 0);
      })();
    </script>
  </body>
  </html>
